<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Books</title>
  </head>
  <body>
    <h1>Books</h1>
    <p><a th:href="@{/books/add}">Add Book</a></p>
    <table border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Author</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="book : ${books}">
          <td th:text="${book.id}">1</td>
          <td th:text="${book.title}">Title</td>
          <td th:text="${book.author}">Author</td>
          <td>
            <a th:href="@{'/books/edit/' + ${book.id}}">Edit</a>
            <form
              th:action="@{'/books/delete/' + ${book.id}}"
              method="post"
              style="display: inline"
            >
              <button type="submit">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
    <p><a th:href="@{/home}">Home</a></p>
  </body>
</html>
